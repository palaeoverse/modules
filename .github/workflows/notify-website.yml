# This workflow exists so that the website is always in sync with modules
# stored in this repo.
#
# It runs after the "Check YAML" workflow completes on "main". Only if those
# checks succeeded does it send a "dispatch" notification to the workflow
# "sync-modules" in palaeoverse/palaeoverse.github.io, which triggers a run to
# update the modules there and re-render the website.

on:
  workflow_run:
    workflows: ["Check YAML"]
    branches: main
    types:
      - completed

name: Notify palaeoverse website

jobs:
  dispatch:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Trigger sync-modules in palaeoverse.github.io
        run: |
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PALAEOVERSE_WEBSITE_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/palaeoverse/palaeoverse.github.io/dispatches \
            -d '{"event_type":"sync-modules"}'