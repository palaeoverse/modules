# This workflow exists so that the website is always in sync with modules
# stored in this repo.
#
# Any time there is a push to "main", it sends a "dispatch" notification to
# the workflow "sync-modules" in palaeoverse/palaeoverse.github.io, which triggers 
# a run to update the modules there and re-render the website.

on:
  push:
    branches: main

name: Notify palaeoverse website

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync-modules in palaeoverse.github.io
        run: |
          curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PALAEOVERSE_WEBSITE_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/palaeoverse/palaeoverse.github.io/dispatches \
            -d '{"event_type":"sync-modules"}'